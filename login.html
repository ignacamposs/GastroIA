<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GastroAI | Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md animate-fade-in">
        <div class="flex flex-col items-center gap-3 mb-10">
            <div class="bg-blue-600 p-4 rounded-[2rem] text-white shadow-xl shadow-blue-200">
                <i data-lucide="coffee" class="w-8 h-8"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">GastroAI</h1>
            <p class="text-slate-400 font-medium text-center">Ingresá a tu turno para comenzar a gestionar.</p>
        </div>

        <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-200">
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-1">Email del Local</label>
                    <input type="email" id="email" placeholder="nombre@cafe.com" class="w-full mt-2 p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold transition-all">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-1">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" class="w-full mt-2 p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold transition-all">
                </div>
                <button id="btn-login" class="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-bold text-lg shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                    Iniciar Sesión <i data-lucide="arrow-right" class="w-5"></i>
                </button>
            </div>
        </div>

        <p class="mt-8 text-center text-slate-400 text-sm">
            ¿No tenés cuenta? <a href="#" class="text-blue-600 font-bold">Contactar a soporte</a>
        </p>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        async function manejarLogin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');
            
            if(!email || !pass) {
                alert("Mati, completá los campos que si no no pasamos.");
                return;
            }

            try {
                btn.innerText = "Verificando...";
                btn.disabled = true;
                
                await signInWithEmailAndPassword(auth, email, pass);
                
                // Si el login es exitoso
                window.location.href = "index.html"; 
            } catch (error) {
                console.error("Error de login:", error.code);
                alert("Error: Usuario o contraseña incorrectos. Revisalos y probá de nuevo.");
                btn.innerText = "Iniciar Sesión";
                btn.disabled = false;
            }
        }

        // Evento al botón
        document.getElementById('btn-login').onclick = manejarLogin;

        // También para que entre con la tecla "Enter"
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') manejarLogin();
        });

        // Inicializar iconos de Lucide
        lucide.createIcons();
    </script>
</body>
</html>
